<div class="container">
  <h2>API Users List</h2>

  <div *ngIf="loading" class="spinner">
    <p>Loading users...</p>
  </div>

  <div *ngIf="!loading" class="user-grid">
    <div *ngFor="let user of users" class="user-card">
      <h3>{{ user.name }}</h3>
      <p>📧 {{ user.email }}</p>
      <p>🌐 {{ user.website }}</p>
    </div>
  </div>
</div>
