<h2>Inventory List</h2>

<h3>Total Items: {{ getTotalItems() }}</h3>

<p *ngIf="items.length === 0">No items available in inventory.</p>

<table *ngIf="items.length > 0">
  <tr>
    <th>ID</th>
    <th>Name</th>
    <th>Category</th>
    <th>Quantity</th>
    <th>Price</th>
    <th>Action</th>
  </tr>

  <tr *ngFor="let item of items">
    <td>{{ item.id }}</td>
    <td>{{ item.name }}</td>
    <td>{{ item.category }}</td>
    <td>{{ item.quantity }}</td>
    <td>₹{{ item.price }}</td>
    <td>
      <button (click)="deleteItem(item.id)">Delete</button>
    </td>
  </tr>
</table>
